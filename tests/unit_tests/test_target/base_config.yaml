core:
  fs: empty_fs.tar.gz
  root_shell: false
  show_output: false
  strace: false
  ltrace: false
  version: 2
  force_www: false
  shared_dir: ./shared

env:
  igloo_init: /run_tests.sh

patches:
  - ./patches/tests/bash.yaml
  - ./patches/tests/core_dumps.yaml
  - ./patches/tests/devfs_passthrough.yaml
  - ./patches/tests/devfs_test.yaml
  - ./patches/tests/env_cmp.yaml
  - ./patches/tests/env_unset.yaml
  - ./patches/tests/hostfile.yaml
  - ./patches/tests/hypercall.yaml
  - ./patches/tests/portalcall.yaml
  - ./patches/tests/net_missing.yaml
  - ./patches/tests/netbinds.yaml
  - ./patches/tests/netdevs.yaml
  - ./patches/tests/netdev_auto_register.yaml
  - ./patches/tests/netdev_names.yaml
  - ./patches/tests/proc_mtd_dynamic.yaml
  - ./patches/tests/proc_mtd.yaml
  - ./patches/tests/proc_self.yaml
  - ./patches/tests/procfs_test.yaml
  - ./patches/tests/pseudofile_devfs.yaml
  - ./patches/tests/pseudofile_ioctl.yaml
  - ./patches/tests/pseudofile_missing.yaml
  - ./patches/tests/pseudofile_mmap_shared.yaml
  - ./patches/tests/pseudofile_readdir.yaml
  - ./patches/tests/pseudofile_sysfs.yaml
  - ./patches/tests/shared_dir.yaml
  # - ./patches/tests/syscall.yaml
  - ./patches/tests/indiv_debug.yaml
  - ./patches/tests/ioctl_interaction.yaml
  - ./patches/tests/portal.yaml
  - ./patches/tests/kffi.yaml
  - ./patches/tests/uprobes.yaml
  - ./patches/tests/scripting.yaml
  - ./patches/tests/module.yaml
  - ./patches/tests/live_image.yaml
  - ./patches/tests/syscalls_logger.yaml
  - ./patches/tests/lifeguard.yaml
  - ./patches/tests/nvram.yaml
  - ./patches/tests/static_fs.yaml
  - ./patches/tests/sysfs_test.yaml
  - ./patches/tests/sysctl_test.yaml
  - ./patches/tests/mtd_test.yaml
  - ./patches/tests/anonfs.yaml
  - ./patches/tests/pseudofiles_comprehensive.yaml
  - ./patches/tests/task_size.yaml
  # - ./patches/tests/uboot_env_cmp.yaml



pseudofiles: {}
nvram: {}
lib_inject: {}

plugins:
  verifier: {}
  core: {}
  netbinds: {}
  health: {}
  shell: {}
  vpn: {}
  pseudofiles: {}
  lifeguard: {}
  interfaces: {}
  send_hypercall: {}
  indiv_debug: {}
  syscalls_logger: {}
  nvram2: {}

static_files:
  /run_tests.sh:
    type: host_file
    host_path: ./scripts/run_tests.sh
    mode: 73

  /igloo/utils/sh:
    type: symlink
    target: /igloo/utils/busybox

  /igloo/source.d/*:
    host_path: /pkg/resources/source.d/*
    mode: 493
    type: host_file

  /igloo/init:
    host_path: /pkg/resources/init.sh
    mode: 493
    type: host_file
