plugins:
  devfs_test: {} 
  verifier:
    conditions:
      devfs_test:
        type: file_contains
        file: console.log
        string: "/tests/devfs_test.sh PASS"

static_files:
  /tests/devfs_test.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      set -eux

      echo "Running comprehensive devfs tests..."

      # ---------------------------------------------------------
      # 1. Test Standard Path and Read/Write States
      # ---------------------------------------------------------
      VAL1=$(/igloo/utils/busybox cat /dev/simpledev)
      if [ "$VAL1" != "0" ]; then
        echo "Error: /dev/simpledev initialized incorrectly (got $VAL1)"
        exit 1
      fi

      echo "42" > /dev/simpledev
      VAL1=$(/igloo/utils/busybox cat /dev/simpledev)
      if [ "$VAL1" != "42" ]; then
        echo "Error: /dev/simpledev failed to update on write (got $VAL1)"
        exit 1
      fi

      # ---------------------------------------------------------
      # 2. Verify Instance Isolation
      # ---------------------------------------------------------
      echo "100" > /dev/bcde
      VAL2=$(/igloo/utils/busybox cat /dev/bcde)
      if [ "$VAL2" != "100" ]; then
        echo "Error: /dev/bcde failed to update on write (got $VAL2)"
        exit 1
      fi

      VAL1=$(/igloo/utils/busybox cat /dev/simpledev)
      if [ "$VAL1" != "42" ]; then
        echo "Error: /dev/simpledev state mutated when writing to /dev/bcde (got $VAL1)"
        exit 1
      fi

      # ---------------------------------------------------------
      # 3. Test Error Propagation from Hypervisor
      # ---------------------------------------------------------
      set +e
      # Writing a string should trigger the ValueError in Python and return -1 (-EPERM)
      echo "not_an_integer" > /dev/simpledev 2>/dev/null
      if [ $? -eq 0 ]; then
         echo "Error: Writing invalid data should have returned a failure code"
         exit 1
      fi
      set -e
      
      # Verify value didn't change after the failed write
      VAL1=$(/igloo/utils/busybox cat /dev/simpledev)
      if [ "$VAL1" != "42" ]; then
        echo "Error: /dev/simpledev mutated during a failed write operation"
        exit 1
      fi

      # ---------------------------------------------------------
      # 4. Test LSEEK / Partial Reads (via ReadBufWrapper)
      # ---------------------------------------------------------
      echo "98765" > /dev/simpledev
      # Read 1 byte, skipping the first 2 bytes ("98"). Should read "7".
      PARTIAL=$(/igloo/utils/busybox dd if=/dev/simpledev bs=1 skip=2 count=1 2>/dev/null)
      if [ "$PARTIAL" != "7" ]; then
          echo "Error: /dev/simpledev partial read/lseek failed (got $PARTIAL instead of 7)"
          exit 1
      fi

      # ---------------------------------------------------------
      # 5. Test Deep Directory Generation
      # ---------------------------------------------------------
      echo "777" > /dev/deep/nested/device
      VAL3=$(/igloo/utils/busybox cat /dev/deep/nested/device)
      if [ "$VAL3" != "777" ]; then
         echo "Error: Nested device failed to process data (got $VAL3)"
         exit 1
      fi

      # ---------------------------------------------------------
      # 6. Test Fixed Major/Minor Injection
      # ---------------------------------------------------------
      # %t = major type in hex, %T = minor type in hex
      MAJOR_HEX=$(/igloo/utils/busybox stat -c "%t" /dev/fixeddev)
      MINOR_HEX=$(/igloo/utils/busybox stat -c "%T" /dev/fixeddev)
      
      # 242 = f2, 42 = 2a
      if [ "$MAJOR_HEX" != "f2" ] || [ "$MINOR_HEX" != "2a" ]; then
         echo "Error: /dev/fixeddev major/minor mismatch (got $MAJOR_HEX:$MINOR_HEX instead of f2:2a)"
         exit 1
      fi
      
      FIXED_VAL=$(/igloo/utils/busybox cat /dev/fixeddev)
      if [ "$FIXED_VAL" != "fixed_node" ]; then
         echo "Error: /dev/fixeddev read mismatch (got $FIXED_VAL)"
         exit 1
      fi

      echo "/tests/devfs_test.sh PASS"
      exit 0
    mode: 73