plugins:
  devfs_test: {} 
  verifier:
    conditions:
      devfs_test:
        type: file_contains
        file: console.log
        string: "/tests/devfs_test.sh PASS"

static_files:
  /tests/devfs_test.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      set -eux

      echo "Running devfs tests..."

      # 1. Test Static Read
      VAL1=$(/igloo/utils/busybox cat /dev/simple)
      if [ "$VAL1" != "Hello DevFS" ]; then
        echo "Error: /dev/simple read failed (got $VAL1)"
        exit 1
      fi

      # 2. Test Dynamic Pointer Operations
      echo "42" > /dev/dynamic
      VAL2=$(/igloo/utils/busybox cat /dev/dynamic)
      if [ "$VAL2" != "42" ]; then
        echo "Error: /dev/dynamic failed to update (got $VAL2)"
        exit 1
      fi

      # 3. Test 64-bit Value Boundaries (LSEEK)
      /igloo/utils/busybox dd bs=1M seek=5000 count=0 of=/dev/lseek64 2>/dev/null
      SEEK_VAL=$(/igloo/utils/busybox cat /dev/lseek64)
      if [ "$SEEK_VAL" != "5242880000" ]; then
        echo "Error: 64-bit lseek pass-by-value failed. Expected 5242880000, got $SEEK_VAL"
        exit 1
      fi

      # 4. Test Stateful Tracking (Open/Release)
      /igloo/utils/busybox cat /dev/tracker > /dev/null
      /igloo/utils/busybox cat /dev/tracker > /dev/null
      TRACK_VAL=$(/igloo/utils/busybox cat /dev/tracker)
      if [ "$TRACK_VAL" != "o:3 r:2" ]; then
        echo "Error: /dev/tracker failed to record open/releases (got $TRACK_VAL)"
        exit 1
      fi

      # 5. Test Deep Directory Creation
      VAL_NESTED=$(/igloo/utils/busybox cat /dev/nested/simple)
      if [ "$VAL_NESTED" != "Hello DevFS" ]; then
        echo "Error: /dev/nested/simple nested creation failed"
        exit 1
      fi

      # 6. Test Fixed Major/Minor
      MAJOR_HEX=$(/igloo/utils/busybox stat -c "%t" /dev/fixeddev)
      MINOR_HEX=$(/igloo/utils/busybox stat -c "%T" /dev/fixeddev)
      if [ "$MAJOR_HEX" != "f2" ] || [ "$MINOR_HEX" != "2a" ]; then
         echo "Error: /dev/fixeddev major/minor mismatch (got $MAJOR_HEX:$MINOR_HEX instead of f2:2a)"
         exit 1
      fi

      # 7. Test VFS Advanced Struct Resolution
      /igloo/utils/strace -o /tmp/adv.log /igloo/utils/busybox dd if=/dev/zero of=/dev/advanced bs=1 count=1 conv=fsync || true
      /igloo/utils/busybox cat /tmp/adv.log

      # 8. Test Error Propagation from Python
      set +e
      echo "not_an_integer" > /dev/dynamic 2>/dev/null
      if [ $? -eq 0 ]; then
         echo "Error: Python failed to propagate -EINVAL error code to guest VFS."
         exit 1
      fi
      set -e

      # ---------------------------------------------------------
      # 9. Test MMAP Capabilities
      # ---------------------------------------------------------
      # Test 9A: Explicit MMAP Support
      MMAP_VAL=$(/igloo/utils/busybox cat /dev/mmap_explicit)
      if [ "$MMAP_VAL" != "mmap_explicit" ]; then
         echo "Error: /dev/mmap_explicit read failed (got $MMAP_VAL)"
         exit 1
      fi

      # Test 9B: Fallback MMAP Support (via size definition)
      MMAP_FB=$(/igloo/utils/busybox cat /dev/mmap_fallback)
      if [ "$MMAP_FB" != "Hello DevFS" ]; then
         echo "Error: /dev/mmap_fallback read failed (got $MMAP_FB)"
         exit 1
      fi
      
      # Test 9C: Custom MMAP Override
      set +e
      /igloo/utils/busybox head -c 1 /dev/mmap_custom > /dev/null 2>&1
      if [ $? -ne 0 ]; then
         echo "Error: Standard read failed on custom mmap device"
         exit 1
      fi
      set -e

      echo "/tests/devfs_test.sh PASS"
      exit 0
    mode: 73