plugins:
  qemu_mem:
    mmap_size: 16M
  native_mmap: {}
  verifier:
    conditions:
      native_mmap_dev:
        type: file_contains
        file: shared/tests/mmap_test/stdout
        string: "native mmap dev PASS"
      native_mmap_proc:
        type: file_contains
        file: shared/tests/mmap_test/stdout
        string: "native mmap proc PASS"
      native_mmap_anon:
        type: file_contains
        file: shared/tests/mmap_test/stdout
        string: "native mmap anon PASS"
      native_mmap_mtd:
        type: file_contains
        file: shared/tests/mmap_test/stdout
        string: "native mmap mtd PASS"
      native_mmap_done:
        type: file_contains
        file: shared/tests/mmap_test/stdout
        string: "/tests/mmap_test PASS"

static_files:
  /tests/mmap_test:
    type: inline_file
    mode: 73
    contents: |
      #!/igloo/utils/sh
      set -eux
      /igloo/utils/busybox cat > /tmp/mmap_native.py <<'PY'
      # Raw libc mmap via ctypes: CPython's mmap module refuses a length larger
      # than the file size, but these targets are page-backed in the kernel and
      # the test maps a full page (matching the original ffi-based test).
      import os, ctypes
      _libc = ctypes.CDLL(None, use_errno=True)
      _libc.mmap.restype = ctypes.c_void_p
      _libc.mmap.argtypes = [ctypes.c_void_p, ctypes.c_size_t, ctypes.c_int,
                             ctypes.c_int, ctypes.c_int, ctypes.c_longlong]
      _libc.munmap.argtypes = [ctypes.c_void_p, ctypes.c_size_t]
      _libc.msync.argtypes = [ctypes.c_void_p, ctypes.c_size_t, ctypes.c_int]
      MAP_FAILED = ctypes.c_void_p(-1).value
      PROT_READ, PROT_WRITE, MAP_SHARED, MS_SYNC = 1, 2, 1, 4

      def check_mmap(path, expected, replacement, marker):
          fd = os.open(path, os.O_RDWR)
          addr = _libc.mmap(None, 4096, PROT_READ | PROT_WRITE, MAP_SHARED, fd, 0)
          if not addr or addr == MAP_FAILED:
              raise OSError(ctypes.get_errno(), "mmap failed for " + path)
          observed = ctypes.string_at(addr, len(expected))
          assert observed == expected, (path, expected, observed)
          ctypes.memmove(addr, replacement, len(replacement))
          _libc.msync(addr, 4096, MS_SYNC)
          _libc.munmap(addr, 4096)
          os.close(fd)
          fd = os.open(path, os.O_RDONLY)
          try:
              observed = os.read(fd, len(replacement))
          finally:
              os.close(fd)
          assert observed == replacement, (path, replacement, observed)
          print(marker)

      check_mmap(
          "/dev/mmap_native",
          b"dev native mmap\n",
          b"dev mmap changed\n",
          "native mmap dev PASS",
      )
      check_mmap(
          "/proc/mmap_native",
          b"proc native mmap\n",
          b"proc mmap change\n",
          "native mmap proc PASS",
      )
      check_mmap(
          "/tmp/mmap_native_anon",
          b"anon native mmap\n",
          b"anon mmap change\n",
          "native mmap anon PASS",
      )
      PY

      /igloo/utils/busybox mdev -s
      /igloo/utils/python3 /tmp/mmap_native.py
      /igloo/utils/busybox mdev -s || true
      MTD=$(/igloo/utils/busybox grep '"mmap_native_mtd"' /proc/mtd | /igloo/utils/busybox cut -d: -f1)
      /igloo/utils/busybox cat /dev/${MTD} | /igloo/utils/busybox strings | /igloo/utils/busybox grep "mtd native mmap"
      /igloo/utils/busybox echo "mtd changed" > /dev/${MTD}
      /igloo/utils/busybox cat /dev/${MTD} | /igloo/utils/busybox strings | /igloo/utils/busybox grep "mtd changed"
      /igloo/utils/busybox echo "native mmap mtd PASS"
      /igloo/utils/busybox echo "/tests/mmap_test PASS"
