plugins:
  verifier:
    conditions:
      pseudofile_mmap_shared:
        type: file_contains
        file: console.log
        string: "/tests/pseudofile_mmap_shared.sh PASS"
      pseudofile_mmap_private:
        type: file_contains
        file: console.log
        string: "/tests/pseudofile_mmap_private.sh PASS"
      pseudofile_permissions:
        type: file_contains
        file: console.log
        string: "/tests/pseudofile_permissions.sh PASS"
      pseudofile_lseek:
        type: file_contains
        file: console.log
        string: "/tests/pseudofile_lseek.sh PASS"
      pseudofile_explicit_lseek:
        type: file_contains
        file: console.log
        string: "/tests/pseudofile_explicit_lseek.sh PASS"
      pseudofile_mmap_rw:
        type: file_contains
        file: console.log
        string: "/tests/pseudofile_mmap_rw.sh PASS"
      pseudofile_release:
        type: file_contains
        file: console.log
        string: "/tests/pseudofile_release.sh PASS"
      pseudofile_poll:
        type: file_contains
        file: console.log
        string: "/tests/pseudofile_poll.sh PASS"

pseudofiles:
  /proc/aaaa/pf:
    size: 22
    read:
      model: const_buf
      val: "Hello from pseudofile!"

static_files:
  # 1. Shared MMAP Test
  /tests/pseudofile_mmap_shared.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os, mmap
      assert os.stat("/proc/aaaa/pf").st_size == 22

      with open("/proc/aaaa/pf", "rb") as f:
          mm = mmap.mmap(f.fileno(), 0x1000, mmap.MAP_SHARED, mmap.PROT_READ)
          assert bytes(mm[:22]) == b"Hello from pseudofile!"
          mm.close()
      print("tests pass")
    mode: 73

  # 2. Private MMAP Test
  /tests/pseudofile_mmap_private.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os, mmap

      with open("/proc/aaaa/pf", "rb") as f:
          mm = mmap.mmap(f.fileno(), 0x1000, mmap.MAP_PRIVATE,
                         mmap.PROT_READ | mmap.PROT_WRITE)
          assert bytes(mm[:22]) == b"Hello from pseudofile!"
          mm.close()
      print("tests pass")
    mode: 73

  # 3. Permissions & Failing Open Test
  /tests/pseudofile_permissions.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os

      try:
          with open("/proc/write_only_proc", "rb") as f:
              f.read()
          print("FAIL: Was able to read a write-only file")
      except OSError as e:
          pass
          
      try:
          with open("/proc/fail_open_proc", "rb") as f:
              pass
          print("FAIL: Was able to open failing file")
      except OSError as e:
          pass 

      print("tests pass")
    mode: 73

  # 4. Sequential Offset Test (Replaces lseek)
  /tests/pseudofile_lseek.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os
      
      with open("/proc/aaaa/pf", "rb") as f:
          # Read first 5 chars
          assert f.read(5) == b"Hello"
          
          # Read next 5 chars to ensure the logical offset (loff) 
          # advances implicitly without throwing ESPIPE from a seek
          assert f.read(5) == b" from"
          
      print("tests pass")
    mode: 73
  /tests/pseudofile_explicit_lseek.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os
      
      with open("/proc/seekable_rw", "r+b") as f:
          # Verify initial state
          assert f.read(12) == b"Initial Data"
          
          # Explicitly seek back to absolute 0 (SEEK_SET)
          f.seek(0)
          assert f.read(7) == b"Initial"
          
          # Explicitly seek to offset 8
          f.seek(8)
          assert f.read(4) == b"Data"
          
      print("tests pass")
    mode: 73

  # 6. MMAP Read, Write, and msync() Commit Test
  /tests/pseudofile_mmap_rw.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os, mmap

      with open("/proc/seekable_rw", "r+b") as f:
          # Map 4KB as Shared & Writable
          mm = mmap.mmap(f.fileno(), 0x1000, mmap.MAP_SHARED,
                         mmap.PROT_READ | mmap.PROT_WRITE)

          # 1. Verify memory reflects the file
          assert bytes(mm[:12]) == b"Initial Data"

          # 2. Write to the memory mapping directly (bypassing f.write)
          mm[0:12] = b"ModifiedData"

          # Unmap the memory (msync doesn't trigger the proxy flush anyway)
          mm.close()
          
      # 3. EXITING the 'with' block calls f.close().
      # This triggers Linux VFS release() -> igloo_proxy_release -> igloo_flush_shm_to_hypervisor!
          
      # 4. Reopen and verify the hypervisor received the committed changes
      with open("/proc/seekable_rw", "rb") as f:
          assert f.read(12) == b"ModifiedData"
          
      print("tests pass")
    mode: 73
  /tests/pseudofile_release.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os
      
      # Step 1: Open and close the file to bump the counters
      f = open("/proc/release_tracker", "r")
      f.close()
      
      # Step 2: Open it again to read the stats. 
      # Since this is the second open, active_opens should be 1, total_opens 2, and total_releases 1.
      with open("/proc/release_tracker", "r") as f:
          data = f.read().strip()
          assert data == "active:1,opens:2,releases:1", f"Unexpected release data: {data}"
          
      print("release tests pass")
    mode: 73
  /tests/pseudofile_poll.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import select
      
      with open("/proc/pollable_proc", "r") as f:
          poll_obj = select.poll()
          poll_obj.register(f, select.POLLIN)
          
          events = poll_obj.poll(100)
          
          assert len(events) == 1, "Expected exactly 1 event"
          obj, event_mask = events[0]
          
          # MicroPython returns the object itself, not the integer FD!
          assert obj == f or obj == f.fileno(), "Event obj does not match file"
          assert event_mask & select.POLLIN, "POLLIN flag not set in event mask"
          
          assert f.read() == "Data is ready!\n"
          
      print("poll tests pass")
    mode: 73