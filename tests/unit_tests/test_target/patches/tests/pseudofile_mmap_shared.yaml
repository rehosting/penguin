pseudofiles:
  /proc/aaaa/pf:
    size: 22
    read:
      model: const_buf
      val: "Hello from pseudofile!"

static_files:
  # 1. Shared MMAP Test
  /tests/pseudofile_mmap_shared.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      # Raw libc mmap via ctypes: CPython's mmap module refuses a length larger
      # than the file size, but these pseudofiles are page-backed in the kernel
      # and the test deliberately maps a full page (matching the original ffi).
      import os, ctypes
      _libc = ctypes.CDLL(None, use_errno=True)
      _libc.mmap.restype = ctypes.c_void_p
      _libc.mmap.argtypes = [ctypes.c_void_p, ctypes.c_size_t, ctypes.c_int,
                             ctypes.c_int, ctypes.c_int, ctypes.c_longlong]
      _libc.munmap.argtypes = [ctypes.c_void_p, ctypes.c_size_t]
      MAP_FAILED = ctypes.c_void_p(-1).value
      PROT_READ, PROT_WRITE, MAP_SHARED, MAP_PRIVATE = 1, 2, 1, 2

      def mmap_fd(fd, length, prot, flags):
          addr = _libc.mmap(None, length, prot, flags, fd, 0)
          if not addr or addr == MAP_FAILED:
              raise OSError(ctypes.get_errno(), "mmap failed")
          return addr

      assert os.stat("/proc/aaaa/pf").st_size == 22
      fd = os.open("/proc/aaaa/pf", os.O_RDONLY)
      try:
          addr = mmap_fd(fd, 0x1000, PROT_READ, MAP_SHARED)
          assert ctypes.string_at(addr, 22) == b"Hello from pseudofile!"
          _libc.munmap(addr, 0x1000)
      finally:
          os.close(fd)
      print("tests pass")
    mode: 73

  # 2. Private MMAP Test
  /tests/pseudofile_mmap_private.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os, ctypes
      _libc = ctypes.CDLL(None, use_errno=True)
      _libc.mmap.restype = ctypes.c_void_p
      _libc.mmap.argtypes = [ctypes.c_void_p, ctypes.c_size_t, ctypes.c_int,
                             ctypes.c_int, ctypes.c_int, ctypes.c_longlong]
      _libc.munmap.argtypes = [ctypes.c_void_p, ctypes.c_size_t]
      MAP_FAILED = ctypes.c_void_p(-1).value
      PROT_READ, PROT_WRITE, MAP_SHARED, MAP_PRIVATE = 1, 2, 1, 2

      def mmap_fd(fd, length, prot, flags):
          addr = _libc.mmap(None, length, prot, flags, fd, 0)
          if not addr or addr == MAP_FAILED:
              raise OSError(ctypes.get_errno(), "mmap failed")
          return addr

      fd = os.open("/proc/aaaa/pf", os.O_RDONLY)
      try:
          addr = mmap_fd(fd, 0x1000, PROT_READ | PROT_WRITE, MAP_PRIVATE)
          assert ctypes.string_at(addr, 22) == b"Hello from pseudofile!"
          _libc.munmap(addr, 0x1000)
      finally:
          os.close(fd)
      print("tests pass")
    mode: 73

  # 3. Permissions & Failing Open Test
  /tests/pseudofile_permissions.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os

      try:
          with open("/proc/write_only_proc", "rb") as f:
              f.read()
          print("FAIL: Was able to read a write-only file")
      except OSError as e:
          pass
          
      try:
          with open("/proc/fail_open_proc", "rb") as f:
              pass
          print("FAIL: Was able to open failing file")
      except OSError as e:
          pass 

      print("tests pass")
    mode: 73

  # 4. Sequential Offset Test (Replaces lseek)
  /tests/pseudofile_lseek.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os
      
      with open("/proc/aaaa/pf", "rb") as f:
          # Read first 5 chars
          assert f.read(5) == b"Hello"
          
          # Read next 5 chars to ensure the logical offset (loff) 
          # advances implicitly without throwing ESPIPE from a seek
          assert f.read(5) == b" from"
          
      print("tests pass")
    mode: 73
  /tests/pseudofile_explicit_lseek.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os

      # Raw fd + os.read/os.lseek: a buffered file object would read ahead a
      # whole buffer on the first read and satisfy later reads/seeks from that
      # buffer, never re-issuing read()/lseek() against the pseudofile.
      fd = os.open("/proc/seekable_rw", os.O_RDWR)
      try:
          # Verify initial state
          assert os.read(fd, 12) == b"Initial Data"

          # Explicitly seek back to absolute 0 (SEEK_SET)
          os.lseek(fd, 0, os.SEEK_SET)
          assert os.read(fd, 7) == b"Initial"

          # Explicitly seek to offset 8
          os.lseek(fd, 8, os.SEEK_SET)
          assert os.read(fd, 4) == b"Data"
      finally:
          os.close(fd)

      print("tests pass")
    mode: 73

  # 6. MMAP Read, Write, and msync() Commit Test
  /tests/pseudofile_mmap_rw.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os, ctypes
      _libc = ctypes.CDLL(None, use_errno=True)
      _libc.mmap.restype = ctypes.c_void_p
      _libc.mmap.argtypes = [ctypes.c_void_p, ctypes.c_size_t, ctypes.c_int,
                             ctypes.c_int, ctypes.c_int, ctypes.c_longlong]
      _libc.munmap.argtypes = [ctypes.c_void_p, ctypes.c_size_t]
      MAP_FAILED = ctypes.c_void_p(-1).value
      PROT_READ, PROT_WRITE, MAP_SHARED = 1, 2, 1

      def mmap_fd(fd, length, prot, flags):
          addr = _libc.mmap(None, length, prot, flags, fd, 0)
          if not addr or addr == MAP_FAILED:
              raise OSError(ctypes.get_errno(), "mmap failed")
          return addr

      # Map 4KB of the pseudofile as Shared & Writable
      fd = os.open("/proc/seekable_rw", os.O_RDWR)
      addr = mmap_fd(fd, 0x1000, PROT_READ | PROT_WRITE, MAP_SHARED)

      # 1. Verify memory reflects the file
      assert ctypes.string_at(addr, 12) == b"Initial Data"

      # 2. Write to the memory mapping directly (bypassing write())
      ctypes.memmove(addr, b"ModifiedData", 12)

      # Unmap the memory (msync doesn't trigger the proxy flush anyway)
      _libc.munmap(addr, 0x1000)

      # 3. Closing the fd triggers Linux VFS release() -> igloo_proxy_release ->
      # igloo_flush_shm_to_hypervisor, committing the shared-mapping changes.
      os.close(fd)

      # 4. Reopen and verify the hypervisor received the committed changes
      fd = os.open("/proc/seekable_rw", os.O_RDONLY)
      try:
          assert os.read(fd, 12) == b"ModifiedData"
      finally:
          os.close(fd)

      print("tests pass")
    mode: 73
  /tests/pseudofile_release.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os
      
      # Step 1: Open and close the file to bump the counters
      f = open("/proc/release_tracker", "r")
      f.close()
      
      # Step 2: Open it again to read the stats. 
      # Since this is the second open, active_opens should be 1, total_opens 2, and total_releases 1.
      with open("/proc/release_tracker", "r") as f:
          data = f.read().strip()
          assert data == "active:1,opens:2,releases:1", f"Unexpected release data: {data}"
          
      print("release tests pass")
    mode: 73
  /tests/pseudofile_poll.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import select
      
      with open("/proc/pollable_proc", "r") as f:
          poll_obj = select.poll()
          poll_obj.register(f, select.POLLIN)
          
          events = poll_obj.poll(100)
          
          assert len(events) == 1, "Expected exactly 1 event"
          obj, event_mask = events[0]
          
          # MicroPython returns the object itself, not the integer FD!
          assert obj == f or obj == f.fileno(), "Event obj does not match file"
          assert event_mask & select.POLLIN, "POLLIN flag not set in event mask"
          
          assert f.read() == "Data is ready!\n"
          
      print("poll tests pass")
    mode: 73