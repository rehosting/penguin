plugins:
  uprobes_test: {}
  verifier:
    conditions:
      uprobes_strncmp_entry:
        type: file_contains
        file: uprobe_strncmp_test.txt
        string: "strncmp entry test passed"
      uprobes_strncmp_return:
        type: file_contains
        file: uprobe_strncmp_test.txt
        string: "strncmp return test passed"
      uprobes_printf_entry:
        type: file_contains
        file: uprobe_printf_test.txt
        string: "printf entry test passed"
      uprobes_printf_return:
        type: file_contains
        file: uprobe_printf_test.txt
        string: "printf return test passed"
      uprobes_fopen_entry:
        type: file_contains
        file: uprobe_fopen_test.txt
        string: "fopen entry test passed"
      uprobes_fopen_return:
        type: file_contains
        file: uprobe_fopen_test.txt
        string: "fopen return test passed"
      uprobes_getenv_entry:
        type: file_contains
        file: uprobe_getenv_test.txt
        string: "getenv entry test passed"
      uprobes_getenv_return:
        type: file_contains
        file: uprobe_getenv_test.txt
        string: "getenv return test passed"
      uprobes_executable_entry:
        type: file_contains
        file: uprobe_executable_test.txt
        string: "executable entry test passed"
      uprobes_executable_return:
        type: file_contains
        file: uprobe_executable_test.txt
        string: "executable return test passed"
      uprobes_all_tests:
        type: file_contains
        file: uprobe_tests_summary.txt
        string: "All uprobe tests PASSED!"
      uprobes_unregister_wrapper:
        type: file_contains
        file: uprobe_unregister_test.txt
        string: "atoi count: 1 (PASSED)"
      uprobes_unregister_name:
        type: file_contains
        file: uprobe_unregister_test.txt
        string: "atol count: 1 (PASSED)"

static_files:
  /tests/uprobes_test.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      # /uprobes_test is a native musl-dynamic binary (guest-utils/native/
      # uprobes_test.c) that calls the probed libc functions directly, so the
      # calls route through /igloo/dylibs/libc.so where the uprobes live. It
      # sets its own comm to "uprobes_test.sh" (the process_filter) via prctl.
      /igloo/utils/busybox chmod +x /uprobes_test
      /uprobes_test
      exit 0

    mode: 73
  /tests/uprobes_test_executable.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      /igloo/utils/busybox chmod +x /test_executable
      /test_executable 3 5
      exit 0

    mode: 73