plugins:
  poll_backing_test: {}
  verifier:
    conditions:
      poll_backing+console:
        type: file_contains
        file: console.log
        string: "/tests/pseudofile_poll_backing.sh PASS"
      poll_backing+stdout:
        type: file_contains
        file: shared/tests/pseudofile_poll_backing.sh/stdout
        string: "pseudofile_poll_backing PASS"

# Regression test for issue #843: a callback-backed /dev node must answer poll()
# in a data-aware way (POLLIN only when data is queued) instead of the legacy
# "always ready" stub that made poll()->read() readers busy-loop.
pseudofiles:
  # 1. First-class single-object backing: one class owns read/write/poll.
  /dev/poll_backing:
    plugin: poll_backing_test:PollBacking

  # 2. Per-domain form: read/write/poll each from_plugin against the same plugin.
  /dev/poll_domain:
    read:
      model: from_plugin
      plugin: poll_backing_test
      function: read
    write:
      model: from_plugin
      plugin: poll_backing_test
      function: write
    poll:
      model: from_plugin
      plugin: poll_backing_test
      function: poll

static_files:
  /tests/pseudofile_poll_backing.sh:
    type: inline_file
    mode: 73
    contents: |
      #!/igloo/utils/micropython
      # NB: use the builtin open()/file-object API + select.poll on the file
      # object. Some arches' micropython build (riscv64, powerpc64, mips64el,
      # loongarch64) ship without os.open/os.read/os.write, so the fd-based
      # os.* API is not portable; open()+poll.register(f) is (see
      # pseudofile_dev_compat_poll, anonfs).
      import select

      POLLIN = getattr(select, "POLLIN", 0x001)

      def poll_in(f, timeout):
          po = select.poll()
          po.register(f, POLLIN)
          return po.poll(timeout)

      def check(path):
          f = open(path, "r+b")  # unbuffered FileIO (binary) -> 1 syscall per read/write
          try:
              # 1. Fresh/empty node must NOT report POLLIN (the busy-loop fix).
              ev = poll_in(f, 0)
              assert not any(m & POLLIN for _, m in ev), \
                  "%s: empty node reported POLLIN" % path

              # 2. After a write enqueues data it must become readable.
              f.write(b"hello")
              ev = poll_in(f, 100)
              assert any(m & POLLIN for _, m in ev), \
                  "%s: node with data did not report POLLIN" % path

              # 3. Read drains the queued bytes.
              data = f.read(16)
              assert data == b"hello", "%s: read got %r" % (path, data)

              # 4. Drained node is no longer readable.
              ev = poll_in(f, 0)
              assert not any(m & POLLIN for _, m in ev), \
                  "%s: drained node still reported POLLIN" % path
          finally:
              f.close()

      check("/dev/poll_backing")   # single-object backing
      check("/dev/poll_domain")    # per-domain poll: from_plugin

      print("pseudofile_poll_backing PASS")
