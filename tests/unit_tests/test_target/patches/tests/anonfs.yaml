plugins:
  anonfs_test: {} 
  verifier:
    conditions:
      anonfs_test_pass:
        type: file_contains
        file: console.log
        string: "/tests/anonfs_test.sh PASS"
      anonfs_test_counter:
        type: file_contains
        file: anonfs_test.txt
        string: "AnonFS Counter Test: PASS"
      anonfs_test_socket:
        type: file_contains
        file: anonfs_test.txt
        string: "MOCK_SOCKET_RECEIVED:6"

static_files:
  /tests/anonfs_test.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      set -eux

      echo "Running anonfs and sockfs comprehensive tests..."

      # ---------------------------------------------------------
      # 1. Test AnonFS Injection & VFS Logic
      # ---------------------------------------------------------
      # The python model is initialized to 10. Writing 5 to it adds to the counter.
      echo "5" > /tmp/anon_counter

      # Read back the value, expecting 15 (10 + 5).
      RES=$(/igloo/utils/busybox cat /tmp/anon_counter)
      if [ "$RES" != "15" ]; then
        echo "Error: AnonFS counter failed. Expected 15 but got $RES"
        exit 1
      fi

      # ---------------------------------------------------------
      # 2. Test SockFS Injection & Protocol Routing
      # ---------------------------------------------------------
      # Writing to a socket FD from the shell triggers vfs_write -> sock_write_iter -> sendmsg.
      # "HELLO" + newline = 6 bytes.
      echo "HELLO" > /tmp/anon_sock

      # ---------------------------------------------------------
      # 3. MicroPython File Type Verification
      # ---------------------------------------------------------
      /igloo/utils/python3 /tests/anonfs_stat_test.py

      echo "/tests/anonfs_test.sh PASS"
      exit 0
    mode: 73

  /tests/anonfs_stat_test.py:
    type: inline_file
    contents: |
      #!/igloo/utils/python3
      import os
      import sys

      S_IFMT = 0o170000
      S_IFSOCK = 0o140000

      # NOTE: use raw os.open() rather than the buffered open() builtin. CPython's
      # io stack issues an isatty()/ioctl() on the fd when wrapping it; on the
      # sockfs-injected /tmp/anon_sock that ioctl reaches a mock socket whose ops
      # table has no ->ioctl handler, which oopses the guest kernel. os.open
      # gives a bare fd and never performs that ioctl.

      # Test Socket (MUST report as a true socket object)
      fd_sock = os.open("/tmp/anon_sock", os.O_WRONLY)
      st_sock = os.stat("/proc/self/fd/%d" % fd_sock)
      if (st_sock.st_mode & S_IFMT) != S_IFSOCK:
          print("Error: /tmp/anon_sock is NOT a socket! Mode: " + oct(st_sock.st_mode))
          sys.exit(1)
      os.close(fd_sock)

      # Test Counter (Should NOT be a socket, it should be an anonymous inode)
      fd_counter = os.open("/tmp/anon_counter", os.O_WRONLY)
      st_counter = os.stat("/proc/self/fd/%d" % fd_counter)
      if (st_counter.st_mode & S_IFMT) == S_IFSOCK:
          print("Error: /tmp/anon_counter is incorrectly reporting as a socket!")
          sys.exit(1)
      os.close(fd_counter)

      print("anonfs stat tests pass")
    mode: 73