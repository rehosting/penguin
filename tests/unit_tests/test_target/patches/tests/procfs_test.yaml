# tests/unit_tests/test_target/patches/tests/procfs_test.yaml
plugins:
  procfs_test: {} 
  verifier:
    conditions:
      procfs_test:
        type: file_contains
        file: console.log
        string: "/tests/procfs_test.sh PASS"

static_files:
  /tests/procfs_test.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      set -eux

      echo "Running procfs comprehensive tests..."

      # 1. State Tracking & Write Logic
      if [ "$(/igloo/utils/busybox cat /proc/dynamic_proc)" != "0" ]; then
        echo "Error: /proc/dynamic_proc initialized incorrectly"
        exit 1
      fi
      echo "42" > /proc/dynamic_proc
      if [ "$(/igloo/utils/busybox cat /proc/dynamic_proc)" != "42" ]; then
        echo "Error: /proc/dynamic_proc failed to update"
        exit 1
      fi

      # 2. 4KB Page Boundary Test
      SIZE=$(/igloo/utils/busybox wc -c < /proc/large_file)
      if [ "$SIZE" != "8192" ]; then
        echo "Error: /proc/large_file returned $SIZE bytes instead of 8192"
        exit 1
      fi

      # 3. Permission Enforcement
      if echo "test" > /proc/cpuinfo 2>/dev/null; then
        echo "Error: Was able to write to read-only /proc/cpuinfo"
        exit 1
      fi

      # ---------------------------------------------------------
      # 6. Test MMAP Capabilities
      # ---------------------------------------------------------
      echo "Testing ProcFS MMAP..."
      
      # Test A: Explicit MMAP Support
      MMAP_VAL=$(/igloo/utils/busybox cat /proc/mmap_explicit)
      if [ "$MMAP_VAL" != "mmap_explicit" ]; then
         echo "Error: /proc/mmap_explicit read failed (got $MMAP_VAL)"
         exit 1
      fi

      # Test B: Fallback MMAP Support (via size definition)
      MMAP_FB=$(/igloo/utils/busybox cat /proc/mmap_fallback)
      if [ "$MMAP_FB" != "Hello from simple_proc!" ]; then
         echo "Error: /proc/mmap_fallback read failed (got $MMAP_FB)"
         exit 1
      fi
      
      # Test C: Custom MMAP Override
      # We explicitly expect this to fail because we overrode the default proxy 
      # and forced it to return -ENODEV (-19) in Python.
      set +e
      # Use head to force standard read() instead of cat which might mmap
      /igloo/utils/busybox head -c 1 /proc/mmap_custom > /dev/null 2>&1
      if [ $? -ne 0 ]; then
         echo "Error: Standard read failed on custom mmap device"
         exit 1
      fi
      
      # Attempt a tool that rigorously relies on mmap
      /igloo/utils/busybox strings /proc/mmap_custom > /dev/null 2>&1
      set -e


      echo "/tests/procfs_test.sh PASS"
      exit 0
    mode: 73