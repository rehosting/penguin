plugins:
  verifier:
    conditions:
      netdevs:
        type: file_contains
        file: console.log
        string: "/tests/netdevs.sh PASS"
  netdevs_test: {}

netdevs:
  - nd0 
  - nd1
  - end4
  - wlan0
  - sample0
  - sample1
  - sample2

static_files:
  /tests/netdevs.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      set -ex

      # Make life easier with an alias
      bb="/igloo/utils/busybox"

      $bb ip a

      # 1. Check that all expected interfaces exist and are UP
      for dev in nd0 nd1 end4 wlan0 sample0 sample1 sample2; do
        if ! $bb ip link show dev $dev; then
          echo "Expected interface $dev not found"
          exit 1
        fi
        if ! $bb ifconfig $dev | $bb grep "^$dev" > /dev/null; then
            echo "Expected interface $dev not up"
            exit 1
        fi
      done

      # 2. Helper function to check interface stats
      check_stats() {
          local dev=$1
          local rx_p=$2
          local tx_p=$3
          local rx_b=$4
          local tx_b=$5

          ifconfig_out=$($bb ifconfig $dev)
          echo "Checking stats for $dev..."
          echo "$ifconfig_out"

          if ! echo "$ifconfig_out" | $bb grep "RX packets:$rx_p" > /dev/null; then
              echo "$dev: RX packets not $rx_p"
              exit 1
          fi
          if ! echo "$ifconfig_out" | $bb grep "TX packets:$tx_p" > /dev/null; then
              echo "$dev: TX packets not $tx_p"
              exit 1
          fi
          if ! echo "$ifconfig_out" | $bb grep "RX bytes:$rx_b" > /dev/null; then
              echo "$dev: RX bytes not $rx_b"
              exit 1
          fi
          if ! echo "$ifconfig_out" | $bb grep "TX bytes:$tx_b" > /dev/null; then
              echo "$dev: TX bytes not $tx_b"
              exit 1
          fi
      }

      # 3. Assert the stats for our Python-hooked netdevs
      # This proves that multiple interfaces don't overwrite each other's net_device_ops!
      check_stats sample0 1337 1338 1339 1340
      check_stats sample1 1337 1338 1339 1340
      check_stats sample2 7331 8331 9331 431

      # 4. Specific checks for sysfs propagation on sample0
      if [ "$($bb cat /sys/class/net/sample0/statistics/rx_bytes)" -ne 1339 ]; then
          echo "sysfs rx_bytes for sample0 is not 1339"
          exit 1
      fi

      echo "/tests/netdevs.sh PASS"
      exit 0
    mode: 73