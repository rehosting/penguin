# tests/unit_tests/test_target/patches/tests/sysctl_test.yaml
plugins:
  sysctl_test: {} 
  verifier:
    conditions:
      sysctl_test:
        type: file_contains
        file: console.log
        string: "/tests/sysctl_test.sh PASS"

static_files:
  /tests/sysctl_test.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      set -eux
      bb="/igloo/utils/busybox"

      echo "Running sysctl comprehensive tests..."

      # 1. Static Read (Check content and exact length)
      output=$($bb cat /proc/sys/kernel/custom_static)
      if [ "$output" != "hello_sysctl" ]; then
        echo "Error: custom_static content mismatch"
        exit 1
      fi
      
      # Use wc -c to check exact bytes (including trailing newlines if any)
      # INITIAL_VALUE = b"hello_sysctl", driver adds nothing else.
      # Wait, proc_dostring might add a newline? Let's check.
      # Actually, let's use a more robust check.
      count=$(echo -n "$output" | $bb wc -c)
      if [ "$count" -ne 12 ]; then
        echo "Error: custom_static length mismatch (expected 12, got $count)"
        exit 1
      fi

      # 2. UsageCounter (Side-effect Test)
      val1=$(/igloo/utils/busybox cat /proc/sys/kernel/usage_counter)
      if [ "$val1" != "AccessID: 1" ]; then
        echo "Error: Expected AccessID: 1, got '$val1'"
        exit 1
      fi

      # 3. Intercepting In-Kernel Node (vm/drop_caches)
      # Trigger the read callback and verify the python layer returns EXACTLY the data
      # We use 'dd' to read exactly the bytes we expect and nothing more, 
      # or just check 'wc -c' of the whole output.
      actual_count=$(/igloo/utils/busybox cat /proc/sys/vm/drop_caches | /igloo/utils/busybox wc -c)
      if [ "$actual_count" -ne 24 ]; then
        echo "Error: vm/drop_caches returned $actual_count bytes, expected 24"
        exit 1
      fi

      # 4. Intercepting In-Kernel Node (kernel/hostname)
      val_host=$(/igloo/utils/busybox cat /proc/sys/kernel/hostname)
      if [ "$val_host" != "hostname_intercepted" ]; then
        echo "Error: Expected hostname_intercepted, got '$val_host'"
        exit 1
      fi

      echo "/tests/sysctl_test.sh PASS"
      exit 0
    mode: 73