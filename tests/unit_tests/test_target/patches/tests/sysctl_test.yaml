# tests/unit_tests/test_target/patches/tests/sysctl_test.yaml
plugins:
  sysctl_test: {} 
  verifier:
    conditions:
      sysctl_test:
        type: file_contains
        file: console.log
        string: "/tests/sysctl_test.sh PASS"

static_files:
  /tests/sysctl_test.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      set -eux

      echo "Running sysctl comprehensive tests..."

      # 1. Static Read
      if [ "$(/igloo/utils/busybox cat /proc/sys/kernel/custom_static)" != "hello_sysctl" ]; then
        echo "Error: custom_static fail"
        exit 1
      fi

      # 2. UsageCounter (Side-effect Test)
      val1=$(/igloo/utils/busybox cat /proc/sys/kernel/usage_counter)
      if [ "$val1" != "AccessID: 1" ]; then
        echo "Error: Expected AccessID: 1, got '$val1'"
        exit 1
      fi

      val2=$(/igloo/utils/busybox cat /proc/sys/kernel/usage_counter)
      if [ "$val2" != "AccessID: 2" ]; then
        echo "Error: Expected AccessID: 2, got '$val2'"
        exit 1
      fi

      # 3. Intercepting In-Kernel Node (vm/drop_caches)
      # Trigger the write callback 
      echo 3 > /proc/sys/vm/drop_caches

      # Trigger the read callback and verify the python layer returns the data
      val_drop=$(/igloo/utils/busybox cat /proc/sys/vm/drop_caches)
      if [ "$val_drop" != "drop_caches_intercepted" ]; then
        echo "Error: Expected drop_caches_intercepted, got '$val_drop'"
        exit 1
      fi

      # 4. Intercepting In-Kernel Node (kernel/hostname)
      val_host=$(/igloo/utils/busybox cat /proc/sys/kernel/hostname)
      if [ "$val_host" != "hostname_intercepted" ]; then
        echo "Error: Expected hostname_intercepted, got '$val_host'"
        exit 1
      fi

      echo "/tests/sysctl_test.sh PASS"
      exit 0
    mode: 73