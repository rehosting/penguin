plugins:
  signal_monitor: {}
  signal_interception_test: {}
  verifier:
    conditions:
      signal_interception+pass:
        type: file_contains
        file: shared/tests/signal_interception.sh/stdout
        string: "/tests/signal_interception.sh PASS"
      signal_interception+dropped:
        type: file_contains
        file: signal_interception_test.txt
        string: "Signal dropped."
      signal_interception+registered:
        type: file_contains
        file: signal_interception_test.txt
        string: "SIGHUP hook registration queued."

static_files:
  /tests/signal_interception.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh

      echo "Starting signal interception test..."
      trap 'echo "SIGHUP handler ran."; exit 1' HUP
      echo "Triggering SIGHUP delivery..."

      /igloo/utils/busybox kill -HUP $$
      echo "SIGHUP delivery survived."
      echo "/tests/signal_interception.sh PASS"
    mode: 73
