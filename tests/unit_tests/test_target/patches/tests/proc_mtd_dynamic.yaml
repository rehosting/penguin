plugins:
  verifier:
    conditions:
      proc_mtd_dynamic:
        type: file_contains
        file: console.log
        string: "/tests/proc_mtd_dynamic.sh PASS"

pseudofiles:
  /dev/mtd100:
    name: fakemtd

static_files:
  /tests/proc_mtd_dynamic.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/python3

      import ctypes
      import sys
      options = ["lib_inject.so", "/igloo/lib_inject_default.so",
          "/igloo/lib_inject_ppc64.so"]
      lib_inject = None
      for option in options:
        try:
          lib_inject = ctypes.CDLL(option)
          break
        except OSError as e:
          print(f"Error loading {option}:", e)
      if lib_inject is None:
        print("Error loading any of the lib_inject libraries.")
        sys.exit(1)

      strstr = lib_inject.libinject_strstr
      strstr.restype = ctypes.c_char_p
      strstr.argtypes = [ctypes.c_char_p, ctypes.c_char_p]

      device_path = None
      with open("/proc/mtd") as f:
        for line in f:
          if strstr(line.encode(), b"flash"):
            device = line.split(":")[0]
            device_path = f"/dev/{device}"
            break

      print("flash device path:", device_path)
    mode: 73
