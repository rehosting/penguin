plugins:
  netbinds:
    # Announce immediately: this test's guest is instrumented heavily enough
    # that background threads (the announce backup timer, vpn_test's probe
    # threads) can be GIL-starved for many seconds, which makes a nonzero
    # announce window nondeterministic here. The nonzero-window debounce path
    # is covered separately by netbinds_announce.yaml.
    announce_debounce_s: 0
  verifier:
    conditions:
      netbinds+console:
        type: file_contains 
        file: console.log
        string: "/tests/netbinds.sh PASS"
      netbinds+busybox:
        type: file_contains 
        file: netbinds.csv
        string: "busybox,6,tcp,[::],8000,"
      vpn_connection:
        type: file_contains
        file: vpn_test.txt
        string: "VPN connection successful!"
      udp_echo:
        type: file_contains
        file: udp_echo_test.txt
        string: "UDP echo successful!"
  vpn_test: {}
static_files:
  /tests/netbinds.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      set -ex

      # start server
      /igloo/utils/busybox httpd -f -p 8000 -h / &
      sleep 1
      /igloo/utils/netcat_udp_echo.sh &
      # echo "tests pass"
      exit 0
    mode: 73
  /igloo/utils/netcat_udp_echo.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      # The host-side vpn_test probe needs the guest to (a) bind UDP 4444 so the
      # bind is detected and the port forwarded, and (b) echo replies back. Bind
      # directly with AF_INET/SOCK_DGRAM (no getaddrinfo: it's a heavier code
      # path and resolves nothing for a numeric address) and run in a restart
      # loop -- CPython is occasionally unstable under MIPS emulation and a
      # long-lived server can take a wild-jump SIGSEGV, so each relaunch re-binds
      # (re-triggering bind detection) while the host retries for ~10s.
      /igloo/utils/busybox cat > /tmp/udp_echo.py <<'PY'
      import socket
      s = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
      s.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
      s.bind(("0.0.0.0", 4444))
      while True:
          data, addr = s.recvfrom(65535)
          s.sendto(b"NETCAT_UDP_ECHO_OK\n", addr)
      PY
      while true; do
        /igloo/utils/python3 /tmp/udp_echo.py
        /igloo/utils/busybox sleep 1
      done

    mode: 73
