plugins:
  kprobes_test: {}
  verifier:
    conditions:
      kprobes_exec_entry:
        type: file_contains
        file: kprobe_exec_test.txt
        string: "kprobe exec entry test passed"
      kprobes_open_return:
        type: file_contains
        file: kprobe_open_test.txt
        string: "kprobe open return test passed"
      kprobes_unregister_handle:
        type: file_contains
        file: kprobe_unregister_test.txt
        string: "handle unregister: PASSED"
      kprobes_unregister_name:
        type: file_contains
        file: kprobe_unregister_test.txt
        string: "name unregister: PASSED"
      kprobes_process_filter:
        type: file_contains
        file: kprobe_filter_test.txt
        string: "process_filter: hits"
      kprobes_process_filter_ok:
        type: file_contains
        file: kprobe_filter_test.txt
        string: "leaks=0 (PASSED)"
      kprobes_pid_filter:
        type: file_contains
        file: kprobe_filter_test.txt
        string: "pid_filter: hits"
      kprobes_write_modify:
        type: file_contains
        file: kprobe_write_test.txt
        string: "kprobe write test passed"

static_files:
  /kprobe_write_target:
    type: inline_file
    contents: |
      this file exists; the write test forces its open to fail
    mode: 420
  /tests/kprobes_test.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      # The kprobes are scoped to comm "kp_actor" so they don't fire on every
      # open/exec system-wide (which would blow the CI budget on slow arches).
      # A subshell renames itself via /proc/self/comm, then drives file opens
      # through SHELL REDIRECTIONS (`true < /path`) so the opening task is the
      # renamed shell (comm "kp_actor"); execs it makes (e.g. busybox sleep) are
      # likewise attributed to comm "kp_actor".
      /igloo/utils/busybox sh -c '
        echo -n kp_actor > /proc/self/comm
        # exec entry probe: any exec by this shell counts
        /igloo/utils/busybox true
        # do_filp_open -ENOENT on a missing path (shell opens it for redirect)
        true < /doesnotexist

        # state-modification: /kprobe_write_target EXISTS, so this open normally
        # succeeds; the kretprobe rewrites the return to -ENOENT, so the redirect
        # fails and we take the else branch, opening /kprobe_write_applied.
        if true < /kprobe_write_target; then
          true < /kprobe_write_not_applied
        else
          true < /kprobe_write_applied
        fi

        # unregister: open each sentinel once (probe fires + self-unregisters),
        # wait for the deferred unregister to settle, then open several more.
        true < /kprobe_unreg_handle
        true < /kprobe_unreg_name
        /igloo/utils/busybox sleep 5
        i=0
        while [ $i -lt 5 ]; do
          true < /kprobe_unreg_handle
          true < /kprobe_unreg_name
          i=$((i+1))
        done
      ' 2>/dev/null
      exit 0

    mode: 73
