plugins:
  static_fs_test: {}
  verifier:
    conditions:
      static_fs+console:
        type: file_contains 
        file: console.log
        string: "/tests/static_fs.sh PASS"
      static_fs+symlink:
        type: file_contains 
        file: shared/tests/static_fs.sh/stdout
        string: "static_fs: python plugin tests passed"

static_files:
  /tests/static_fs.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      set -x
      set +e # ignore non-zero exit code

      # Trigger the static_fs_test python plugin via ioctl
      # We use 0x89f5 to uniquely identify this test's trigger
      /igloo/utils/send_syscall ioctl 0x0 0x89f5 stringval

      if [ $? -ne 14 ]; then
        echo "Error: send_syscall retval failed"
        exit 1
      fi

      echo "static_fs: python plugin tests passed"
      exit 0
    mode: 73

  /igloo/test_target_file.txt:
    type: inline_file
    contents: "static_fs test string"
    mode: 0o644

  /igloo/test_symlink.txt:
    type: symlink
    target: /igloo/test_target_file.txt

  # 1. Multi-hop symlinks
  /igloo/multi_link_1.txt:
    type: symlink
    target: /igloo/multi_link_2.txt
  /igloo/multi_link_2.txt:
    type: symlink
    target: /igloo/test_target_file.txt

  # 2. Broken symlink
  /igloo/broken_link.txt:
    type: symlink
    target: /igloo/does_not_exist.txt

  # 3. Symlink loop
  /igloo/loop_1.txt:
    type: symlink
    target: /igloo/loop_2.txt
  /igloo/loop_2.txt:
    type: symlink
    target: /igloo/loop_1.txt

  # 4. Directory listing tests
  /igloo/fake_dir/file1.txt:
    type: inline_file
    contents: "file1"
    mode: 0o755
  /igloo/fake_dir/file2.txt:
    type: inline_file
    contents: "file2"
    mode: 0o644