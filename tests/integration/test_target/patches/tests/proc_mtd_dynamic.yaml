plugins:
  verifier:
    conditions:
      proc_mtd_dynamic:
        type: file_contains
        file: console.log
        string: "/tests/proc_mtd_dynamic.sh PASS"

pseudofiles:
  /dev/mtd100:
    name: fakemtd

static_files:
  /tests/proc_mtd_dynamic.sh:
    type: inline_file
    contents: |
      #!/igloo/utils/sh
      # /proc_mtd_dynamic is a native musl-dynamic binary (guest-utils/native/
      # proc_mtd_dynamic.c) that dlopens the musl lib_inject and calls its
      # libinject_strstr to scan /proc/mtd. A native musl binary loads the musl
      # injection lib cleanly; dlopening it from glibc python3 crashes on 32-bit.
      # exec so the binary's exit code is the script's: a lib_inject load
      # failure (return 1) must fail the test, as the old python driver did.
      /igloo/utils/busybox chmod +x /proc_mtd_dynamic
      exec /proc_mtd_dynamic
    mode: 73
