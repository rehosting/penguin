name: Docs

# Docs (Sphinx HTML + LaTeX PDF) and the GitHub Pages deploy, decoupled from
# publish.yaml. Runs AFTER the "Release Container" (publish) workflow completes,
# builds the docs from the just-published image, deploys Pages, and attaches the
# PDF + docs tarball to the latest release. A docs/PDF failure here no longer
# blocks the image publish or the GitHub release.
#
# NOTE: this uses `workflow_run`, NOT `on: release`. publish creates the release
# with the default GITHUB_TOKEN, and GitHub does not fire `release` events from
# GITHUB_TOKEN-created releases (recursion prevention) — so `on: release` would
# never trigger. `workflow_run` fires regardless.
on:
  workflow_run:
    workflows: ["Release Container"]
    types: [completed]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to (re)build docs for (default: latest release)"
        required: false
        default: ""

permissions:
  contents: write   # attach PDF/docs.tar.gz assets to the release
  pages: write
  id-token: write
  actions: write    # delete stale github-pages artifacts left by prior re-run attempts

concurrency:
  group: "docs"
  cancel-in-progress: false

jobs:
  build_docs:
    runs-on: rehosting-arc
    # Only after a SUCCESSFUL publish (or a manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      # nix-setup expects these on the self-hosted Arc pool (mirrors build.yaml).
      USER: runner
      LOGNAME: runner
      TMPDIR: /home/runner/_work/_temp
      XDG_CACHE_HOME: /home/runner/_work/.cache
    steps:
      - name: Install dependencies and label git workspace safe
        run: |
          # rehosting-arc's runner image ships broken apt sources; repoint to the
          # MIT mirror before installing (same fixup the old publish job used).
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt-get clean
          for f in /etc/apt/sources.list /etc/apt/sources.list.d/ubuntu.sources; do
            if [ -f "$f" ]; then
              sudo sed -i -E 's/([a-z]+\.)?archive\.ubuntu\.com/mirrors.mit.edu/g' "$f"
              sudo sed -i -E 's/security\.ubuntu\.com/mirrors.mit.edu/g' "$f"
            fi
          done
          sudo apt-get update
          sudo apt-get -y install git curl jq gzip
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # Resolve which release to build docs for: the dispatch input if given,
      # else the latest release (which the just-finished publish created).
      - name: Resolve release tag
        id: rel
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag }}"
          if [ -z "$tag" ]; then
            # The rehosting-arc runner has no `gh` CLI, so hit the REST API
            # directly (curl + jq are installed above). `releases/latest`
            # returns the newest published release — i.e. the one the
            # just-finished publish workflow created.
            tag="$(curl -fsSL \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/latest" \
              | jq -r .tag_name)"
          fi
          if [ -z "$tag" ] || [ "$tag" = "null" ]; then
            echo "Could not resolve a release tag" >&2
            exit 1
          fi
          echo "Building docs for release: $tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.rel.outputs.tag }}

      # Build the docs image (rehosting/penguin:docs) from the Nix flake: the
      # runtime image plus the in-image sphinx toolchain + LaTeX engine. There
      # is no Dockerfile; .#docsImage is named rehosting/penguin:docs, so a
      # plain `docker load` of the result tarball gives the tag the docs run
      # expects. Pulls from the rehosting-tools Cachix cache (the runtime image
      # was just published, so most of the closure is cached).
      - name: Prepare runner directories
        run: mkdir -p "$TMPDIR" "$XDG_CACHE_HOME"

      - name: Set up Nix
        uses: rehosting/ci/actions/nix-setup@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache-backend: cachix
          cachix-name: rehosting-tools
          cachix-auth-token: ${{ secrets.CACHIX_REHOSTING }}
          enable-kvm: false
          extra-nix-config: |
            max-jobs = 8
            cores = 8

      - name: Build docs image
        run: |
          set -eux
          nix build -L .#docsImage
          docker load < result

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10.12"
      - name: Install dependencies
        run: pip install click pyyaml

      - name: Generate Docs
        run: |
          timeout 10m python3 $GITHUB_WORKSPACE/tests/integration/test_target/test.py -i rehosting/penguin:docs --docs-only
          cp $GITHUB_WORKSPACE/tests/integration/test_target/results/latest/sphinx/latex/penguin.pdf $GITHUB_WORKSPACE/tests/integration/test_target/results/latest/sphinx/html
          tar -czvf $GITHUB_WORKSPACE/docs.tar.gz -C $GITHUB_WORKSPACE/tests/integration/test_target/results/latest/sphinx/html .

      - name: Attach docs assets to the release
        uses: softprops/action-gh-release@v2.3.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.rel.outputs.tag }}
          files: |
            ${{ github.workspace }}/tests/integration/test_target/results/latest/sphinx/latex/penguin.pdf
            ${{ github.workspace }}/docs.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: html
          path: ${{ github.workspace }}/docs.tar.gz

  deploy_static:
    needs: build_docs
    runs-on: ubuntu-latest
    permissions:
      contents: write   # force-push the rendered HTML to the `docs` branch
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: html
      - name: Unzip HTML
        run: |
          mkdir html_content
          tar -xvf docs.tar.gz -C html_content

      # Also publish the rendered site to a `docs` branch so it can be cloned
      # and served directly (git clone --branch docs --depth 1 …), independent
      # of the GitHub Pages artifact deploy below and the release tarball.
      # force_orphan keeps `docs` as a single-commit, generated-only branch with
      # no shared history — never hand-edit it. peaceiris disables Jekyll (drops
      # a .nojekyll) by default, which Sphinx's `_static/` dirs require.
      - name: Publish HTML to the docs branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./html_content
          publish_branch: docs
          force_orphan: true
      # A re-run (workflow or just this job) does NOT clear artifacts uploaded by
      # a prior attempt. upload-pages-artifact always names its artifact
      # "github-pages", so a re-run leaves 2+ identically-named artifacts in the
      # run and deploy-pages@v4 aborts with "Multiple artifacts named
      # github-pages were unexpectedly found". Delete any stale one first so
      # exactly one exists at deploy time.
      - name: Delete stale github-pages artifacts from prior attempts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          ids=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/artifacts" \
            --paginate --jq '.artifacts[] | select(.name=="github-pages") | .id')
          for id in $ids; do
            echo "Deleting stale github-pages artifact $id"
            gh api -X DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${id}" || true
          done
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'html_content'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
