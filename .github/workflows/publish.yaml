name: Release Container

on:
  push:
    branches:
      - main
  # Manual trigger: cut a release on demand (also useful for verifying the
  # release pipeline after CI changes). Like a push to main, this bumps the
  # version and publishes — there is no dry-run.
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

# One release at a time; don't cancel an in-progress production release.
concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  # 1. Compute the next version (off the self-hosted pool).
  version:
    runs-on: ubuntu-latest
    outputs:
      v: ${{ steps.version.outputs.v-version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get next version
        id: version
        uses: reecetech/version-increment@2023.10.1
        with:
          use_api: true

  # 2. Build the image from the Nix flake and push to Harbor AND Docker Hub via
  #    the shared Nix workflow (counterpart of build-and-push.yml; there is no
  #    Dockerfile). tag-sha tags Harbor :<sha>; extra-tags add the bare-repo
  #    :<version>/:latest tags, which the dockerhub-token also pushes to Docker
  #    Hub. The build pulls from (and, on this non-PR push, pushes to) the
  #    rehosting-tools Cachix cache via nix-setup -- the Nix equivalent of the
  #    old registry buildx cache.
  build:
    needs: version
    uses: rehosting/ci/.github/workflows/nix-image-push.yml@v1
    with:
      image: rehosting/penguin
      flake-attr: .#dockerImage
      cachix-name: rehosting-tools
      enable-kvm: false
      dockerhub-user: rehosting
      extra-tags: |
        rehosting/penguin:${{ needs.version.outputs.v }}
        rehosting/penguin:latest
    secrets:
      registry: ${{ secrets.REHOSTING_ARC_REGISTRY }}
      registry-user: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
      registry-password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}
      dockerhub-token: ${{ secrets.DOCKERHUB_TOKEN }}
      cachix-auth-token: ${{ secrets.CACHIX_REHOSTING }}

  # 3. Config schema + GitHub release (after the image exists). Docs/PDF/Pages
  #    are built out-of-band by docs.yaml, which runs via `workflow_run` after
  #    this workflow completes (a GITHUB_TOKEN-created release can't fire
  #    `on: release`).
  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python for config schema
        uses: actions/setup-python@v6
        with:
          python-version: "3.10.12"
      - name: Install dependencies for config schema
        run: pip install pydantic pydantic-partial pyyaml yamlcore
      - name: Generate config schema
        run: python3 src/penguin/penguin_config/gen_docs.py schema > config_schema.yaml

      - name: Upload config schema to server
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: config_schema.yaml
          REMOTE_HOST: rehosti.ng
          REMOTE_USER: github
          TARGET: /var/www/igloo

      - name: Create release
        id: create_release
        uses: softprops/action-gh-release@v2.3.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.version.outputs.v }}
          name: Release ${{ needs.version.outputs.v }} ${{ github.ref }}
          body: |
            Release ${{ needs.version.outputs.v }} @${{ github.ref }}
          draft: false
          generate_release_notes: true
          prerelease: false
          # The PDF + docs.tar.gz are attached to this release by docs.yaml
          # after it builds the docs (release: published trigger).
          files: |
            config_schema.yaml
