name: KVM probe (throwaway)

# Throwaway diagnostic: determine WHERE /dev/kvm is visible on the rehosting-arc
# runner so the real KVM lane can be wired correctly. Runs on push to the
# kvm-lane branch (workflow_dispatch only works from the default branch).
# Delete this file before merging the KVM lane.
on:
  push:
    branches: [kvm-lane]

jobs:
  probe:
    runs-on: rehosting-arc
    steps:
      - name: /dev/kvm in the RUNNER container (where ./penguin wrapper runs)
        run: |
          echo "=== runner container ==="
          uname -a || true
          ls -l /dev/kvm 2>&1 || echo "  /dev/kvm ABSENT in runner container"
          echo "DOCKER_HOST=${DOCKER_HOST:-<unset>}"

      - name: /dev/kvm via the dind daemon (where penguin's nested docker run lands)
        run: |
          echo "=== dind: plain run, no device flag ==="
          docker run --rm alpine sh -c 'ls -l /dev/kvm 2>&1 || echo "  ABSENT without --device"'
          echo "=== dind: run WITH --device=/dev/kvm (what the wrapper would add) ==="
          docker run --rm --device=/dev/kvm alpine sh -c 'ls -l /dev/kvm && echo "  /dev/kvm USABLE via dind --device"' \
            || echo "  FAILED: dind cannot pass /dev/kvm (node lacks it or not exposed)"
          echo "=== dind host info ==="
          docker info --format '{{.OperatingSystem}} / {{.KernelVersion}} / {{.Architecture}}' 2>&1 || true
