name: Test Container

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened, ready_for_review]

env:
  REGISTRY: ${{ secrets.REHOSTING_ARC_REGISTRY || 'harbor.harbor.svc.cluster.local' }}
  USER: ${{ secrets.REHOSTING_ARC_REGISTRY_USER || 'external' }}
  CACHE: ${{ secrets.REHOSTING_ARC_REGISTRY && format('{0}/proxy', secrets.REHOSTING_ARC_REGISTRY) || 'docker.io' }}
  TARGET: ${{ secrets.REHOSTING_ARC_REGISTRY || 'harbor.harbor.svc.cluster.local/external' }}
  EXTERNAL_REGISTRY_PASS: 'PctyVGasz15Pn9M0yA9yMNwOawFaXnk3Tl4N'

jobs:
  changes:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    outputs:
      run_lint: ${{ steps.filter.outputs.python }}
      # Run the guest-test matrix on code changes OR on changes to the test
      # workflow / test fixtures themselves (the `code` filter excludes
      # .github/**, so a build.yaml-only change would otherwise skip the tests
      # it governs).
      run_tests: ${{ steps.filter.outputs.code == 'true' || steps.filter.outputs.testci == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          predicate-quantifier: 'every'  # require file to satisfy all positives and none of the negatives
          filters: |
            # Treat anything outside docs/.github/README/etc as "code"
            code:
              - '**'
              - '!docs/**'
              - '!.github/**'
              - '!README.md'
              - '!LICENSE'
              - '!**/.gitignore'
            python:
              - '**/*.py'
            # Changes that should re-run the guest-test matrix even though the
            # `code` filter excludes .github/**: the test workflow, the flake
            # (which builds the image), and fixtures.
            testci:
              - '.github/workflows/build.yaml'
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - 'tests/**'
  lint:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: rehosting-arc
    needs: changes
    steps:
    - uses: actions/checkout@v5
      if: ${{ needs.changes.outputs.run_lint == 'true' }}
      with:
        fetch-depth: 0
    - name: Set up Python
      if: ${{ needs.changes.outputs.run_lint == 'true' }}
      uses: actions/setup-python@v6
      with:
        python-version: "3.10.12"
    - name: Install dependencies
      if: ${{ needs.changes.outputs.run_lint == 'true' }}
      run: pip install flake8 lintly markupsafe==2.0.1
    - name: Lint with flake8
      if: ${{ needs.changes.outputs.run_lint == 'true' && github.event.pull_request.head.repo.full_name == github.repository }}
      run: |
        set -o pipefail
        (flake8 | lintly) 2>lintly.err || {
          if grep -q 'diff exceeded the maximum number of lines' lintly.err; then
            echo "Bypassing lint failure due to large diff."
            exit 0
          else
            cat lintly.err
            exit 1
          fi
        }
      env:
        LINTLY_API_KEY: ${{ secrets.GITHUB_TOKEN }}
    - name: External lint
      if: ${{ needs.changes.outputs.run_lint == 'true'  && github.event.pull_request.head.repo.full_name != github.repository }}
      run: |
        flake8

  # Build the penguin image from the Nix flake (flake.nix at the repo root) and
  # push it to Harbor as :<sha>, via the shared rehosting/ci reusable workflow
  # (the Nix counterpart of build-and-push.yml). The flake is the sole build
  # path -- there is no Dockerfile. The build is heavy (full qemu system-arch
  # matrix + python env), so it pulls from the rehosting-tools Cachix cache;
  # PR builds pull only (nix-setup skips the Cachix push on pull_request).
  build_container:
    needs: [changes, lint]
    if: ${{ !github.event.pull_request.draft && needs.changes.outputs.run_tests == 'true' }}
    uses: rehosting/ci/.github/workflows/nix-image-push.yml@v1
    with:
      image: rehosting/penguin
      flake-attr: .#dockerImage
      cachix-name: rehosting-tools
      # Self-hosted Arc pods expose /dev/kvm without a working udevd, which
      # breaks install-nix-action's KVM setup; the image build needs no VM.
      enable-kvm: false
    secrets:
      registry: ${{ secrets.REHOSTING_ARC_REGISTRY }}
      registry-user: ${{ secrets.REHOSTING_ARC_REGISTRY_USER }}
      registry-password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD }}
      cachix-auth-token: ${{ secrets.CACHIX_REHOSTING }}

  # Run the basic_target + test_target suites against the Nix-built image across
  # all 12 bootable system arches the flake produces -- including powerpc
  # (32-bit BE) and powerpc64le. (powerpc64el is an alias of powerpc64le -- same
  # ppc64-softmmu library -- so it is not tested separately.)
  run_tests:
    needs: [changes, build_container]
    runs-on: rehosting-arc
    if: ${{ !github.event.pull_request.draft }}
    strategy:
      fail-fast: false
      matrix:
        arch: ["armel", "mipsel", "mipseb", "mips64el", "mips64eb", "powerpc", "powerpc64", "powerpc64le", "loongarch64", "aarch64", "x86_64", "riscv64"]

    steps:
      - name: Checkout code
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      # Acquire the prebuilt image with a plain `docker pull` via the shared
      # org action. install-cert is off: the rehosting-arc dind daemon already
      # trusts Harbor's CA (system trust store). install-python pulls the deps
      # the test runners need (click, pyyaml).
      - name: Set up penguin image
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        uses: rehosting/ci/actions/pull-image@v1
        with:
          registry: ${{ env.REGISTRY }}
          target: ${{ env.TARGET }}
          image: rehosting/penguin
          tag: ${{ github.sha }}
          local-tag: rehosting/penguin:latest
          username: ${{ env.USER }}
          password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD || env.EXTERNAL_REGISTRY_PASS }}
          install-python: "true"
          install-cert: "false"

      - name: Basic test for ${{ matrix.arch }}
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        run: timeout 10m python3 $GITHUB_WORKSPACE/tests/unit_tests/basic_target/test.py --arch ${{ matrix.arch }}

      - name: Test for ${{ matrix.arch }} all kernels
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        # 20m (was 10m): the test_target suite now drives full CPython per
        # python test instead of micropython, which pushes slow-emulated arches
        # (powerpc64, loongarch64) past the old 10m budget.
        run: timeout 20m python3 $GITHUB_WORKSPACE/tests/unit_tests/test_target/test.py --arch ${{ matrix.arch }}

      - name: Test Report
        uses: dorny/test-reporter@v2.1.1
        if: ${{ needs.changes.outputs.run_tests == 'true'  && ((success() || failure()) && github.event.pull_request.head.repo.full_name == github.repository)}}
        with:
          name: ${{ matrix.arch }}-test-results
          # Update the glob pattern here to only match numbered folders
          path: ${{ github.workspace }}/tests/unit_tests/test_target/results/[0-9]*/verifier.xml
          reporter: java-junit

      - name: Debug info
        if: ${{ needs.changes.outputs.run_tests == 'true' && failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.arch }}-artifacts
          if-no-files-found: ignore
          # Capture both suites: a basic_target failure aborts before
          # test_target runs, so its results/ would otherwise never be uploaded.
          path: |
            ${{ github.workspace }}/tests/unit_tests/basic_target/projects/empty_fs/results/latest/
            ${{ github.workspace }}/tests/unit_tests/test_target/results/latest/

  run_compose:
    # Compose's mcast plumbing is arch-independent, so this runs once outside
    # the per-arch matrix instead of multiplying CI cost by 12.
    needs: [changes, build_container]
    runs-on: rehosting-arc
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Set up Python
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        uses: actions/setup-python@v6
        with:
          python-version: "3.10.12"
      - name: Install dependencies
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        run: pip install click pyyaml
      - name: Checkout code
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Trust Harbor's self-signed certificate
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        run: |
          echo "Fetching certificate from ${{ env.REGISTRY }}"
          openssl s_client -showcerts -connect ${{ env.REGISTRY }}:443 < /dev/null 2>/dev/null | openssl x509 -outform PEM | sudo tee /usr/local/share/ca-certificates/harbor.crt > /dev/null
          sudo update-ca-certificates

      - name: Set up Docker Buildx
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            network=host
          buildkitd-config-inline: |
            [registry."${{ env.REGISTRY }}"]
              insecure = true
              http = true

      - name: Log in to Rehosting Arc Registry
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ env.USER }}
          password: ${{ secrets.REHOSTING_ARC_REGISTRY_PASSWORD || env.EXTERNAL_REGISTRY_PASS }}

      - name: Pull image via Buildx and Load to Daemon
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        run: |
          echo "FROM ${{ env.TARGET }}/rehosting/penguin:${{ github.sha }}" | \
          docker buildx build -t rehosting/penguin:latest --load -

      - name: Compose test (armel)
        if: ${{ needs.changes.outputs.run_tests == 'true' }}
        run: timeout 8m python3 $GITHUB_WORKSPACE/tests/unit_tests/compose/test.py --arch armel

      - name: Compose debug info
        if: ${{ needs.changes.outputs.run_tests == 'true' && failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: compose-artifacts
          path: ${{ github.workspace }}/tests/unit_tests/compose/compose_projects/
