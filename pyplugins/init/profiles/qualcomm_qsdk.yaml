# SDK profile: ASUSWRT on Qualcomm QSDK (Atheros/IPQ + QCA SSDK switch).
#
# Fingerprint confirmed at the source level against a Qualcomm-QSDK ASUSWRT GPL
# release: the QCA SSDK switch driver (qca-ssdk.ko), the ASUSWRT nvram ABI
# (nvram_xfr, NVRAM_IOCTL_GET_SPACE / get_nvram_space over /dev/nvram), and the
# uClibc loader (ld-uClibc.so.0) that ignores LD_PRELOAD -- which is exactly why
# the bundle REPLACES libnvram.so via a DT_NEEDED shim instead of preloading.
name: qualcomm_qsdk
description: ASUSWRT on Qualcomm QSDK (QCA SSDK switch + uClibc, LD_PRELOAD-blind)

provenance: ASUSWRT / Qualcomm QSDK reference rehost

# qca-ssdk.ko is the silicon discriminator (vs Broadcom's et/robo switch).
# get_nvram_space / nvram_xfr are the ASUSWRT-on-QSDK nvram surface uClibc eager-
# binds. (The uClibc loader's LD_PRELOAD-blindness is why the bundle uses a
# DT_NEEDED shim rather than a preload -- but `ld-uClibc.so.0` is NOT a fingerprint
# signal: it is present on any uClibc firmware, so it false-fired on unrelated
# uClibc SDKs, e.g. Realtek RTL819x. The genuinely QCA-exclusive markers below are
# sufficient.)
fingerprint:
  - {kind: file, any: [qca-ssdk.ko]}                       # ClusterCollector.files
  - {kind: symbol, any: [get_nvram_space, nvram_xfr]}      # LibrarySymbols
enable_if:
  # Both genuine markers (silicon .ko + the QSDK nvram symbols); RT-AC58U fires
  # both (was 3-of-3 with the dropped uClibc signal, now 2-of-2). Requiring two
  # blocks a lone nvram_xfr from false-firing on non-QCA asuswrt.
  min_signals: 2

# Fidelity-tiered bundles, both keyed off the fingerprint above. Only Tier 0
# (libinject) exists for this SDK; a Tier-1 `mtd` model would back the QSDK
# nvram partition once its flash format is reversed.
bundles:
  # Tier 0: SDK-general fix (verified in a Qualcomm-QSDK ASUSWRT reference
  # rehost): the uClibc loader ignores LD_PRELOAD and /etc/ld.so.preload, so
  # Penguin's default preload interception never loads. Replace the firmware's
  # libnvram.so (which rc/nvram/libshared all DT_NEEDED) with lib_inject, and
  # alias the ASUS-specific nvram symbols uClibc binds eagerly onto lib_inject
  # helpers. (Model-identity seeding like productid is per-device, not part of
  # this SDK profile.)
  libinject:
    static_files:
      /usr/lib/libnvram.so:
        type: shim
        target: /igloo/dylibs/lib_inject.so
    lib_inject:
      aliases:
        get_nvram_space: libinject_nvram_get_nvramspace
        nvram_xfr: libinject_ret_0_arg
        nvram_get_salt: libinject_ret_0_arg
        nvram_file2nvram: libinject_ret_0
        nvram_nvram2file: libinject_ret_0

  # Tier: boot-to-runtime, SILICON half -- the Qualcomm analogue of
  # `sdk.broadcom_hnd.boot`'s bcm6300_switch. Emitted as the DISABLED candidate
  # `sdk.qualcomm_qsdk.boot` (QualcommQsdkBootProfile). The userland-generic
  # boot/WAN blockers are handled by the shared `asuswrt` profile -- promote
  # `sdk.asuswrt.boot` (restore-defaults reboot + GPIO) and `sdk.asuswrt.wan`
  # (WAN state machine via nvram_pin + VPN owned-interface) alongside this.
  #
  # SOURCE-DERIVED, NOT YET BOOT-VERIFIED. Unlike Broadcom's swmdk (which ioctls
  # the switch directly and reboots on a failed cdk_dev_create), ASUSWRT-on-QSDK
  # drives the QCA8337 switch entirely through `ssdk_sh` SHELL commands and parses
  # their stdout (reversed from the RT-AC58U/IPQ4019 GPL:
  # shared/sysdeps/qca/qca8337_ssdk_sh.c get_qca8337_port_info + init-qca.c). The
  # real /usr/sbin/ssdk_sh talks to the qca-ssdk kernel driver, absent under
  # emulation (vendor 3.14 .ko), so the port queries return nothing and switch/
  # port-link detection fails. So shim /usr/sbin/ssdk_sh (installed there per the
  # qca-ssdk-shell Makefile) with canned output: report every port linked at 1G
  # in the exact format the parser expects ("[Status]:ENABLE" / "[speed]:1000")
  # and swallow all config subcommands (vlan/portVlan/qos/misc/port set) as
  # success. This is a config-only shim (like the broadcom mtd tier's
  # hndnvram.sh), no pyplugin. Verify + confirm boot-gating once a bootable QSDK
  # ASUSWRT rootfs is available (only GPL source is on hand here).
  boot:
    static_files:
      /usr/sbin/ssdk_sh:
        type: inline_file
        mode: 0755  # YAML 1.1 octal (safe_load parses 0o755 as a string)
        contents: |
          #!/bin/sh
          # penguin sdk.qualcomm_qsdk.boot -- canned QCA SSDK switch tool.
          # ASUSWRT parses these two queries (qca8337_ssdk_sh.c); everything else
          # is fire-and-forget. Report all ports linked at 1G, swallow the rest.
          case "$1 $2 $3" in
              "port linkstatus get") echo "[Status]:ENABLE" ;;
              "port speed get")      echo "[speed]:1000" ;;
          esac
          exit 0
