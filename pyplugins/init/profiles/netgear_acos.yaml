# SDK profile: Netgear ACOS (Broadcom-based; acosNvramConfig userland).
#
# A profile is fingerprint + fidelity-tiered bundles. SdkFinder scores the
# fingerprint against static analyses that already run; NetgearAcosProfile emits
# bundles.libinject as the named patch `sdk.netgear_acos`, ENABLED when the
# fingerprint corroborates (>= enable_if.min_signals) and DISABLED (a search
# candidate) otherwise.
#
# This profile subsumes the former Slice-0 sdk.netgear_acos alias group: the
# WAN_ith_CONFIG_GET shim now rides in the bundle alongside the ACOS nvram
# defaults that used to be shipped unconditionally by nvram.04_defaults.
name: netgear_acos
description: Netgear ACOS (Broadcom-based; acosNvramConfig userland + ReadySHARE)

# Netgear ACOS nvram keys and the acosNvramConfig ABI are source-confirmed against
# an R7000-class ACOS GPL release. Specific device targets are tracked internally.
provenance: Netgear ACOS reference (source-derived, R7000-class GPL)

# acosNvramConfig_* is the ACOS discriminator (vs a plain Broadcom nvram userland);
# libacos_shared.so / acos_nat.ko and the acos_service init program corroborate.
fingerprint:
  - {kind: symbol, any: [acosNvramConfig_get, acosNvramConfig_set, acosNvramConfig_read]}  # LibrarySymbols
  - {kind: file, any: [libacos_shared.so, acos_nat.ko]}                                    # ClusterCollector.files
  - {kind: executable, any: [acos_service, acos_init]}                                     # ClusterCollector.executables
enable_if:
  min_signals: 2

bundles:
  # Tier 0: the ACOS nvram defaults (formerly always-on FirmAE defaults) plus the
  # ACOS config-getter shim, now gated behind the fingerprint above.
  libinject:
    nvram:
      sku_name: ""
      wla_wlanstate: ""
      time_zone_x: "0"
      rip_multicast: "0"
      bs_trustedip_enable: "0"
      filter_rule_tbl: ""
      # ReadySHARE USB storage descriptors (FirmAE ACOS defaults, preserved verbatim).
      usb_info_dev0: "A200396E0402FF83@1@14.4G@U@1@USB_Storage;U:;0;0@"
      usb_info_dev1: "A200396E0402FF83@1@14.4G@U@1@USB_Storage;U:;0;0@"
